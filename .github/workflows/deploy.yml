name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: watch-sky
  REGION: asia-east1
  SERVICE: watch-sky
  IMAGE: gcr.io/watch-sky/watch-sky

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push Docker image
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          docker build \
            --build-arg VITE_SUPABASE_URL="$VITE_SUPABASE_URL" \
            --build-arg VITE_SUPABASE_ANON_KEY="$VITE_SUPABASE_ANON_KEY" \
            -t "${{ env.IMAGE }}:${{ github.sha }}" \
            -t "${{ env.IMAGE }}:latest" \
            .
          docker push "${{ env.IMAGE }}:${{ github.sha }}"
          docker push "${{ env.IMAGE }}:latest"

      - name: Deploy to Cloud Run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Write env vars to a YAML file so special chars in JWT keys don't break gcloud's parser
          python3 - <<'PYEOF'
import os, yaml
with open('/tmp/env-vars.yaml', 'w') as f:
    yaml.dump({
        'SUPABASE_URL': os.environ['SUPABASE_URL'],
        'SUPABASE_ANON_KEY': os.environ['SUPABASE_ANON_KEY'],
        'SUPABASE_SERVICE_KEY': os.environ['SUPABASE_SERVICE_KEY'],
    }, f)
PYEOF

          gcloud run deploy "${{ env.SERVICE }}" \
            --image "${{ env.IMAGE }}:${{ github.sha }}" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --env-vars-file /tmp/env-vars.yaml \
            --min-instances 0 \
            --max-instances 10 \
            --memory 512Mi \
            --cpu 1 \
            --port 8080 \
            --quiet
